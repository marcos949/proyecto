version: '3.8'

services:
  contenedor-alfa:
    image: nginx:alpine
    container_name: web-render-1
    ports:
      - "8081:80"
    volumes:
      # Corregido: apunta a tu carpeta real 'desarrollo'
      - ./desarrollo:/usr/share/nginx/index.html

  contenedor-beta:
    image: nginx:alpine
    container_name: web-render-2
    ports:
      - "8082:80"
    volumes:
      # Corregido: apunta a tu carpeta real 'proyecto'
      - ./proyecto:/usr/share/nginx/index.html
