version: '3.8'

services:
  contenedor-alfa:
    image: nginx:alpine
    container_name: web-render-1
    ports:
      - "8081:80"
    volumes:
      # Usamos ./ seguido del nombre exacto de la carpeta que subiste a GitHub
      - ./desarrollo:/usr/share/nginx/html:ro

  contenedor-beta:
    image: nginx:alpine
    container_name: web-render-2
    ports:
      - "8082:80"
    volumes:
      - ./proyecto:/usr/share/nginx/html:ro
